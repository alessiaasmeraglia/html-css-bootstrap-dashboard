<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalogo Libri Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/styles/style.css">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
    <!-- HEADER -->
    <header>
        <!-- Navbar -->
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container-fluid">
                <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
                    <img src="/img/duck.png" alt="Logo" width="30" height="30">                    
                </a>
                
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="mainNavbar">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link active" href="#">Catalogo Libri</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Anagrafica Utenti</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Storico Prestiti</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Help</a></li>
                    </ul>

                    <form class="d-flex" role="search">
                    <input class="form-control me-2" type="search" placeholder="Cerca...">
                    <button class="btn btn-outline-light" type="submit">Cerca</button>
                    </form>
                </div>
            </div>
        </nav>
    </header>

    <!-- CONTENUTO PRINCIPALE -->
    <main class="page-content">
        <div class="container-fluid form-wrapper">
            <div class="row mt-4">
                <div class="col-12">
                    <h1 class="page-title mb-5">Nuovo Libro</h1>
                </div>
            </div>

            <form>
                <div class="row g-4">
                    <!-- Nome autore -->
                    <div class="col-6 col-md-6">
                        <label for="title" class="form-label fw-semibold">Nome Autore</label>
                        <input type="text" class="form-control" id="title" placeholder="Inserisci il nome dell'autore">
                    </div>
                    <!-- Cognome autore -->
                    <div class="col-6 col-md-6">
                        <label for="author" class="form-label fw-semibold">Cognome Autore</label>
                        <input type="text" class="form-control" id="author" placeholder="Inserisci il cognome dell'autore">
                    </div>
                    <!-- Titolo libro -->
                    <div class="col-12">
                        <label for="title" class="form-label fw-semibold">Titolo</label>
                        <input type="text" class="form-control" id="title" placeholder="Inserisci il titolo del libro">
                        <div class="form-text">Titolo versione italiana</div>
                    </div>
                    <!-- Genere -->
                    <div class="col-12 col-lg-4">
                        <label for="year" class="form-label fw-semibold">Genere</label>
                        <select class="form-select" aria-label="Default select example">
                            <option selected>Scegli il genere</option>
                            <option value="1">Fantasy</option>
                            <option value="2">Romanzo</option>
                            <option value="3">Thriller</option>
                            <option value="4">Horror</option>
                            <option value="5">Classico</option>
                        </select>
                    </div>
                    <!-- Anno di pubblicazione -->
                    <div class="col-12 col-lg-4">
                        <label for="year" class="form-label fw-semibold">Anno di pubblicazione</label>
                        <input type="text" class="form-control" id="year" placeholder="Inserisci l'anno di pubblicazione">
                    </div>
                    <!-- Codice ISBN-->
                    <div class="col-12 col-lg-4">
                        <label for="isbn" class="form-label fw-semibold">Codice ISBN#</label>
                        <input type="text" class="form-control" id="isbn" placeholder="Inserisci il codice ISBN">
                    </div>
                    <!-- Separatore-->
                    <div class="col-12">
                        <hr class="form-separator">
                    </div>

                    <!-- Note -->
                    <div class="col-12">
                        <label for="notes" class="form-label form-page-label">Note</label>
                        <textarea class="form-control form-page-control form-page-textarea" id="notes" rows="5" placeholder="Inserisci eventuali note sul libro"></textarea>
                    </div>
                    <!-- Disponibilità digitale -->
                    <div class="col-12">
                        <div class="form-check digital-check">
                        <input class="form-check-input" type="checkbox" value="" id="digitalBook">
                        <label class="form-check-label digital-check-label" for="digitalBook">
                            Disponibile anche in digitale
                        </label>
                    </div>
                    <!-- Bottone -->
                    <div class="col-12 mt-3">
                        <button type="submit" class="btn btn-primary submit-book-btn">Aggiungi Libro</button>
                    </div>
                </div>

                
                
            </form>
            

                
        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
