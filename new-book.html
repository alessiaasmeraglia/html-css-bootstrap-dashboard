<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalogo Libri Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/styles/style.css">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
    <header>
        <!-- Navbar -->
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container-fluid">
                <a class="navbar-brand d-flex align-items-center gap-2" href="#">
                    <img src="/img/duck.png" alt="Logo" width="30" height="30">                    
                </a>
                
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="mainNavbar">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link active" href="#">Catalogo Libri</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Anagrafica Utenti</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Storico Prestiti</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Help</a></li>
                    </ul>

                    <form class="d-flex" role="search">
                    <input class="form-control me-2" type="search" placeholder="Cerca...">
                    <button class="btn btn-outline-light" type="submit">Cerca</button>
                    </form>
                </div>
            </div>
        </nav>
    </header>

    <main class="page-content">
        <div class="container-fluid form-wrapper">
            <div class="row">
                <div class="col-12">
                    <h1 class="page-title mb-5">Nuovo Libro</h1>
                </div>
            </div>

            <form>
                <div class="row g-4">
                    <div class="col-12 col-md-6">
                        <label for="title" class="form-label">Titolo</label>
                        <input type="text" class="form-control" id="title" placeholder="Inserisci il titolo del libro">
                    </div>
                    <div class="col-12 col-md-6">
                        <label for="author" class="form-label">Autore</label>
                        <input type="text" class="form-control" id="author" placeholder="Inserisci l'autore del libro">
                    </div>
                </div>
            </form>
            

                
        </div>

                <aside class="col-12 col-xl-4">
                    <div class="p-3">
                        <!-- Dettagli libro -->

                    </div>
                </aside>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
